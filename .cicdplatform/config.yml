version: '1.0'

jobs:

  runs-on: node-ci-base:latest

  setup:
    steps:
      - name: Clean Workspace
        run: rm -rf /workspace/app

      - name: Clone repo
        run: git clone https://github.com/Sectani/Node-App /workspace/app

      - name: Install dependencies
        working-directory: /workspace/app/
        run: npm ci

  test:
    depends-on: setup
    steps:
      - name: Run tests
        working-directory: /workspace/app/
        run: npm test

  build:
    depends-on: test
    steps:
      - name: Build
        working-directory: /workspace/app/
        run: npm run build || echo "No build script defined"

      - name: Copy artifacts
        run: cp -r build /artifacts/ || echo "No build found"

  deploy:
    depends-on: build
    steps:
      - name: Build Docker Image
        working-directory: /workspace/app/
        run: docker build -t sectani/node-app:latest .

      - name: Login to Docker Hub
        run: |
          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_EAMIL" --password-stdin

      - name: Push Docker Image
        run: docker push sectani/node-app:latest

      - name: Deploy to Kubernetes
        working-directory: .
        run: |
          cat <<EOF > /tmp/kubeconfig
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: 
              server: https://host.docker.internal:6443
            name: k3d-mycluster
          contexts:
          - context:
              cluster: k3d-mycluster
              user: admin@k3d-mycluster
            name: k3d-mycluster
          current-context: k3d-mycluster
          kind: Config
          preferences: {}
          users:
          - name: admin@k3d-mycluster
            user:
              client-certificate-data: 
              client-key-data: 
          EOF
          export KUBECONFIG=/tmp/kubeconfig
          kubectl apply -f deployment.yml
          kubectl rollout status deployment/node-app
